services:
  - type: web
    name: shelby-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
